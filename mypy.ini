[mypy]
# Type-check the app code strictly; just run `mypy` from the repo root.
python_version = 3.12
files = src, tools, tests
strict = True

# rgbmatrix is unstubbed and only installed on the Pi (see renderer.py /
# CLAUDE.md). Treat it as untyped so off-Pi checks pass.
[mypy-rgbmatrix.*]
ignore_missing_imports = True
